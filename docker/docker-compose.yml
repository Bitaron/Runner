version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: apiforge-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - web
      - api
    networks:
      - apiforge-network
    restart: unless-stopped

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    container_name: apiforge-web
    env_file:
      - ../.env
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://api:4000
      - NEXT_PUBLIC_WS_URL=ws://api:4000
    depends_on:
      - api
    networks:
      - apiforge-network
    restart: unless-stopped

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: apiforge-api
    env_file:
      - ../.env
    environment:
      - NODE_ENV=production
      - PORT=4000
      - COUCHDB_URL=http://couchdb:5984
      - COUCHDB_ADMIN_USER=admin
      - COUCHDB_ADMIN_PASSWORD=password
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-jwt-key}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-your-super-secret-refresh-key}
      - CORS_ORIGIN=http://localhost
    volumes:
      - uploads:/app/uploads
    depends_on:
      - couchdb
    networks:
      - apiforge-network
    restart: unless-stopped

  couchdb:
    image: couchdb:3
    container_name: apiforge-db
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=password
    ports:
      - "5984:5984"
    volumes:
      - couchdb-data:/opt/couchdb/data
    networks:
      - apiforge-network
    restart: unless-stopped

volumes:
  couchdb-data:
  uploads:

networks:
  apiforge-network:
    driver: bridge
